<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật món ăn</title>
    <style>
        body { font-family: sans-serif; background: #eee; display: flex; justify-content: center; padding: 20px; }
        .card { background: #fff; width: 450px; border-radius: 5px;  }
        h2 { background: red; color: #fff; margin: 0; padding: 15px; text-align: center; font-size: 18px; }
        form { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: bold; font-size: 13px; }
        label span { color: red; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid gray; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        button { background: #e74c3c; color: #fff; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="card">
    <h2>CẬP NHẬT MÓN ĂN</h2>
    <form id="foodForm">
        <div>
            <label>Tên món ăn <span>*</span></label>
            <input type="text" id="name" placeholder="Ví dụ: Phở bò Hà Nội" required>
        </div>
        <div>
            <label>Mô tả <span>*</span></label>
            <textarea id="desc" required placeholder="Mô tả ngắn..."></textarea>
        </div>
        <div>
            <label>Danh mục <span>*</span></label>
            <select id="cate" required>
                <option value="">Chọn danh mục</option>
                <option value="1">Món chính</option>
            </select>
        </div>
        <div class="row">
            <div style="flex:1">
                <label>Giá gốc (VNĐ) <span>*</span></label>
                <input type="number" id="price" value="45000" min="0" required>
            </div>
            <div style="flex:1">
                <label>Giá KM (VNĐ)</label>
                <input type="number" id="sale" value="3900" min="0">
            </div>
        </div>
        <div>
            <label>Thời gian nấu (phút) <span>*</span></label>
            <input type="number" id="time" value="25" min="1" required>
        </div>
        <button type="submit">Cập nhật món ăn</button>
    </form>
</div>

<script>
    document.getElementById('foodForm').onsubmit = (e) => {
        e.preventDefault();
        const p = +document.getElementById('price').value;
        const s = +document.getElementById('sale').value;

        // Logic kiểm tra tùy chỉnh duy nhất còn lại
        if (s >= p) {
            alert("Giá khuyến mãi phải nhỏ hơn giá gốc!");
            return;
        }

        alert("Cập nhật thành công!");
    };
</script>

</body>
</html>
